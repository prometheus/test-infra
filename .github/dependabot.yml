version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      k8s.io:
        patterns:
          - "k8s.io/*"
      go.opentelemetry.io:
        patterns:
          - "go.opentelemetry.io/*"
      aws-sdk-v2:
        patterns:
          - "github.com/aws/aws-sdk-go-v2*"
    open-pull-requests-limit: 20
